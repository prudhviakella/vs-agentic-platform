[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths      = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ────────────────────────────────────────────────────────────────────
# Run fast tests only (CI):   pytest -m "not llm and not slow"
# Run evals only:             pytest -m llm
# Run everything:             pytest
markers =
    unit:  fast, deterministic, no LLM calls
    llm:   requires real LLM API call — excluded from fast CI runs
    slow:  integration tests, run pre-release

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html
    # exclude llm tests by default — run with: pytest -m llm to include
    -m "not llm"

# ── Logging ────────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = WARNING
